   <!--Marker and Google Maps API Code via https://developers.google.com/maps/documentation/javascript/markers#add-->
   <div id="map"></div>
    <script>
      var map;
      function initMap() {
 	     var myLatLng = {lat: 46.550913, lng: -119.488974};
    	 var map = new google.maps.Map(document.getElementById('map'), {
          center: myLatLng,
          zoom: 9
        });        
        
         var marker = new google.maps.Marker({
       	  position: myLatLng,
    	  map: map,
    	  title: 'Ernest Thornhill'
	  });
	}
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap"
    async defer></script>
